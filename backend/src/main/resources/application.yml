spring:
  application:
    name: accident-reporting-api
  jackson:
    deserialization:
      fail-on-unknown-properties: true
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
  h2:
    console:
      enabled: true
  datasource:
    url: jdbc:h2:mem:testdb
    driverClassName: org.h2.Driver
    username: sa
    password:

server:
  port: 8080
  servlet:
    context-path: /

logging:
  level:
    root: INFO
    com.accidentreport: INFO

firebase:
  enabled: false
  config:
    database-url: YOUR_FIREBASE_REALTIME_DB_URL

app:
  security:
    require-auth: true
  cors:
    allowed-origins:
      - http://localhost:3000
      - http://localhost:5173
